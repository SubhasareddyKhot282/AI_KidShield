<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard AI - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03060c;
            --surface: rgba(13, 22, 38, 0.6);
            --border: rgba(30, 48, 80, 0.8);
            --accent: #00d4ff;
            --accent3: #a855f7;
            --danger: #ef4444;
            --text: #e2eaf7;
            --muted: #8b9ebf;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Abstract Background Elements */
        .bg-glow-1 {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
            top: -200px; left: -200px; border-radius: 50%; z-index: 0; filter: blur(60px);
            animation: float 8s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, transparent 70%);
            bottom: -150px; right: -150px; border-radius: 50%; z-index: 0; filter: blur(60px);
            animation: float 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        /* login Container */
        .login-box {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 212, 255, 0.4);
        }
        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        .logo-text span { color: var(--accent); }
        .logo-sub {
            color: var(--muted);
            font-size: 14px;
            margin-top: 4px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Error Label */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-size: 14px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 500;
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Form Elements */
        .input-group { margin-bottom: 24px; }
        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-field {
            width: 100%;
            background: rgba(13, 22, 38, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
        }
        .input-field::placeholder { color: rgba(139, 158, 191, 0.4); }

        /* Button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(0, 212, 255, 0.3);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(0, 212, 255, 0.4);
            filter: brightness(1.1);
        }
        .btn-submit:active {
            transform: translateY(0);
        }

        /* Footer */
        .login-footer {
            margin-top: 32px;
            text-align: center;
            color: rgba(139, 158, 191, 0.6);
            font-size: 13px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="login-box">
        <div class="logo-container">
            <div class="logo-icon">🛡️</div>
            <div class="logo-text">Safe<span>Guard</span> AI</div>
            <div class="logo-sub">Parent Portal Authentication</div>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="input-group">
                <label class="input-label" for="password">Master Password</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="Enter parental password..." required autofocus>
            </div>

            <button type="submit" class="btn-submit">Access Dashboard</button>
        </form>

        <div class="login-footer">
            &copy; 2026 SafeGuard AI Engine
        </div>
    </div>

</body>
</html>
